# docker-compose.yml
services:

  fifa_backend:
    build:
      context: ./backend
    container_name: fifa_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "3003:3000"

  fifa_frontend:
    build:
      context: ./frontend
    container_name: fifa_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.production
    depends_on:
      - fifa_backend
    ports:
      - "3004:3000"

  postgres:
    image: postgres:17
    container_name: fifa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fifa
      POSTGRES_PASSWORD: fifa
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: